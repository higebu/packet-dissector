# release-plz configuration
# https://release-plz.dev/docs/config

[workspace]
# Monorepo tag / release strategy.
# Every package shares `version_group = "workspace"`, so one release produces
# a single version. If every crate tried to create a `v{{ version }}` tag and
# GitHub release, the second crate would fail with HTTP 422
# "Reference already exists" and abort the publish run. Disable tag / release
# creation at the workspace level and re-enable it only for the
# `packet-dissector` facade crate below, so the workspace gets exactly one tag
# and one GitHub release per version.
git_tag_enable = false
git_release_enable = false

# Naming templates (applied by the facade override)
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"

# PR title/commit matches the existing convention
pr_name = "chore(release): v{{ version }}"
pr_labels = ["release"]

# Publish to crates.io
publish = true

# Skip `cargo publish`'s local verify step. Workspace crates dev-depend on
# `packet-dissector-test-alloc` via `workspace = true`, which expands to a
# versioned requirement. During a fresh workspace release, the first crate
# published (`packet-dissector-core`) succeeds, but the next crate (e.g.
# `packet-dissector-ah`) fails verification because `test-alloc` is not yet
# on crates.io. `--no-verify` skips the local build/resolve so release-plz
# can publish the remaining crates in dependency order. CI already builds
# and tests the whole workspace before release, so the verify step is
# redundant here.
publish_no_verify = true

# Update Cargo.lock in the release PR
dependencies_update = true

# cargo-semver-checks for public APIs
semver_check = true

# Default: don't write a per-crate changelog. Only the facade does.
changelog_update = false

# Per-package configuration.
# All packages share one version_group so they bump together.
# Only the facade `packet-dissector` owns the single workspace CHANGELOG.md
# and aggregates commits from every other crate via `changelog_include`.

[[package]]
name = "packet-dissector"
version_group = "workspace"
changelog_update = true
changelog_path = "CHANGELOG.md"
# Facade crate owns the single workspace-level git tag and GitHub release.
git_tag_enable = true
git_release_enable = true
changelog_include = [
  "packet-dissector-ah",
  "packet-dissector-arp",

packet-dissector-mdns = { workspace = true, optional = true }
packet-dissector-dhcp = { workspace = true, optional = true }
packet-dissector-dhcpv6 = { workspace = true, optional = true }
packet-dissector-srv6 = { workspace = true, optional = true }
packet-dissector-gtpv1u = { workspace = true, optional = true }
packet-dissector-gtpv2c = { workspace = true, optional = true }

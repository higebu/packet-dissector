[package]
name = "packet-dissector"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "A Rust crate for zero-copy parsing of layered network packets with registry-based protocol chaining"
readme = "../../README.md"
keywords = ["packet", "network", "dissector", "parser", "protocol"]
categories = ["network-programming", "parser-implementations"]

[features]
default = [
  "ethernet",
  "linux_sll",
  "linux_sll2",
  "arp",
  "lacp",
  "ipv4",
  "ipv6",
  "icmp",
  "icmpv6",
  "igmp",
  "tcp",
  "udp",
  "sctp",
  "dns",
  "mdns",
  "dhcp",
  "dhcpv6",
  "srv6",
  "gtpv1u",
  "gtpv2c",
  "pfcp",
  "http",
  "http2",
  "sip",
  "diameter",
  "nas5g",
  "ngap",
  "geneve",
  "gre",
  "vxlan",
  "lldp",
  "stp",
  "mpls",
  "ntp",
  "ospf",
  "vrrp",
  "bfd",
  "isis",
  "bgp",
  "l2tp",
  "l2tpv3",
  "tls",
  "ppp",
  "radius",
  "ah",
  "esp",
  "esp-decrypt",
  "ike",
  "rtp",
  "quic",
  "stun",
]
ethernet = ["dep:packet-dissector-ethernet"]
linux_sll = ["dep:packet-dissector-linux-sll"]
linux_sll2 = ["dep:packet-dissector-linux-sll2"]
arp = ["dep:packet-dissector-arp"]
lacp = ["dep:packet-dissector-lacp"]
ipv4 = ["dep:packet-dissector-ipv4"]
ipv6 = ["dep:packet-dissector-ipv6"]
icmp = ["dep:packet-dissector-icmp"]
icmpv6 = ["dep:packet-dissector-icmpv6"]
igmp = ["dep:packet-dissector-igmp"]
tcp = ["dep:packet-dissector-tcp", "dep:packet-dissector-reassembly"]
udp = ["dep:packet-dissector-udp"]
sctp = ["dep:packet-dissector-sctp"]
dns = ["dep:packet-dissector-dns"]
mdns = ["dep:packet-dissector-mdns"]
dhcp = ["dep:packet-dissector-dhcp"]
dhcpv6 = ["dep:packet-dissector-dhcpv6"]
srv6 = ["dep:packet-dissector-srv6"]
gtpv1u = ["dep:packet-dissector-gtpv1u"]
gtpv2c = ["dep:packet-dissector-gtpv2c"]
pfcp = ["dep:packet-dissector-pfcp"]
http = ["dep:packet-dissector-http"]
http2 = ["dep:packet-dissector-http2"]
sip = ["dep:packet-dissector-sip"]
diameter = ["dep:packet-dissector-diameter"]
nas5g = ["dep:packet-dissector-nas5g"]
ngap = ["dep:packet-dissector-ngap", "nas5g"]
geneve = ["dep:packet-dissector-geneve"]
gre = ["dep:packet-dissector-gre"]
vxlan = ["dep:packet-dissector-vxlan"]
lldp = ["dep:packet-dissector-lldp"]
stp = ["dep:packet-dissector-stp"]
mpls = ["dep:packet-dissector-mpls"]
ntp = ["dep:packet-dissector-ntp"]
ospf = ["dep:packet-dissector-ospf"]
vrrp = ["dep:packet-dissector-vrrp"]
bfd = ["dep:packet-dissector-bfd"]
isis = ["dep:packet-dissector-isis"]
bgp = ["dep:packet-dissector-bgp"]
l2tp = ["dep:packet-dissector-l2tp"]
l2tpv3 = ["dep:packet-dissector-l2tpv3"]
tls = ["dep:packet-dissector-tls"]
ppp = ["dep:packet-dissector-ppp"]
radius = ["dep:packet-dissector-radius"]
ah = ["dep:packet-dissector-ah"]
esp = ["dep:packet-dissector-esp"]
ike = ["dep:packet-dissector-ike"]
esp-decrypt = ["esp", "packet-dissector-esp/decrypt"]
rtp = ["dep:packet-dissector-rtp"]
quic = ["dep:packet-dissector-quic"]
stun = ["dep:packet-dissector-stun"]

## Convenience feature groups
layer2 = [
  "ethernet",
  "linux_sll",
  "linux_sll2",
  "arp",
  "lacp",
  "lldp",
  "stp",
  "ppp",
]
layer3 = ["ipv4", "ipv6", "icmp", "icmpv6", "igmp", "srv6"]
layer4 = ["tcp", "udp", "sctp"]
application = [
  "dns",
  "mdns",
  "dhcp",
  "dhcpv6",
  "http",
  "http2",
  "sip",
  "diameter",
  "ntp",
  "radius",
  "rtp",
  "tls",
  "quic",
  "stun",
]
tunneling = ["gre", "geneve", "vxlan", "l2tp", "l2tpv3", "mpls"]
routing = ["ospf", "isis", "bgp", "bfd", "vrrp"]
ipsec = ["ah", "esp", "ike"]
3gpp = ["gtpv1u", "gtpv2c", "pfcp", "nas5g", "ngap"]

